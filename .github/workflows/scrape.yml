name: Scrape darts data and rebuild dashboard

on:
  schedule:
    # Daily at 07:00 UTC (08:00 BST). Adjust as needed.
    - cron: "0 4 * * *"
  workflow_dispatch:   # manual trigger from the Actions tab

permissions:
  contents: write       # needed so the bot can push the rebuilt docs/ back

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scrape + build
        run: python scripts/scrape_and_build.py

      - name: Commit refreshed dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh dashboard ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
